<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>404 — Page Not Found — Creator Studio</title>
  <meta name="description" content="The page you're looking for doesn't exist." />
  <meta name="theme-color" content="#0f1724" />

  <link rel="stylesheet" href="style.css">
  <style>
    .error-hero{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:60vh;padding:40px 28px;text-align:center;
    }
    .error-code{
      font-size:8rem;font-weight:900;letter-spacing:-0.04em;
      background:linear-gradient(135deg, var(--accent), #ff8a3d);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      line-height:1;margin:0;
    }
    .error-message{
      color:var(--muted);font-size:1.2rem;margin:12px 0 28px;max-width:480px;line-height:1.5;
    }
    .error-links{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="logo" href="index.html">Creator Studio</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="chatbot.html">Chatbot</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>

  <main class="error-hero">
    <h1 class="error-code">404</h1>
    <p class="error-message">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <div class="error-links">
      <a class="cta" href="index.html">Go Home</a>
      <a class="cta" href="chatbot.html" style="background:linear-gradient(90deg,#9fc9ff,#6ba3ff)">Ask the Chatbot</a>
    </div>

      <p>© 2026 Creator Studio. All rights reserved. <a href="terms.html">Terms</a> · <a href="privacy.html">Privacy</a></p>
